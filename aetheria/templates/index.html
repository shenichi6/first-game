<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aetheria: Echoes of the Void</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div id="app">

    <!-- TOP BAR -->

    <header class="topbar">

        <div class="logo">
            AETHERIA
        </div>

        <div class="resources">

            <div class="resource">
                💎 <span id="gems">1000</span>
            </div>

            <div class="resource">
                🪙 <span id="gold">5000</span>
            </div>

        </div>

    </header>

    <!-- MAIN VIEW -->

    <main>

        <!-- ========================= -->
        <!-- LOBBY -->
        <!-- ========================= -->

        <section id="lobby-view">

            <div class="lobby-hero">

                <h1>Echoes of the Void</h1>

                <p>
                    The Void spreads across Aetheria.
                    Gather heroes and fight back.
                </p>

            </div>

            <div class="afk-box">

                <div>
                    <h3>AFK Rewards Ready</h3>
                    <p>Gold + Hero XP</p>
                </div>

                <button onclick="claimAFK()">
                    CLAIM
                </button>

            </div>

            <div class="menu-grid">

                <button onclick="showView('battle')">
                    ⚔ Campaign
                </button>

                <button onclick="showView('summon')">
                    ✨ Summon
                </button>

                <button onclick="showView('heroes')">
                    🛡 Heroes
                </button>

                <button onclick="showView('guild')">
                    🏰 Guild
                </button>

            </div>

        </section>

        <!-- ========================= -->
        <!-- BATTLE -->
        <!-- ========================= -->

        <section id="battle-view" class="hidden">

            <div class="battle-top">

                <button onclick="showView('lobby')">
                    ← Back
                </button>

                <h2>
                    Forest of Whispers
                </h2>

            </div>

            <!-- Battlefield -->

            <div id="battlefield">

                <!-- ENEMY SIDE -->

                <div class="enemy-side">

                    <div class="back-row">

                        <div id="enemy-4"></div>
                        <div id="enemy-5"></div>

                    </div>

                    <div class="front-row">

                        <div id="enemy-1"></div>
                        <div id="enemy-2"></div>
                        <div id="enemy-3"></div>

                    </div>

                </div>

                <!-- HERO SIDE -->

                <div class="hero-side">

                    <div class="front-row">

                        <div id="hero-1"></div>
                        <div id="hero-2"></div>
                        <div id="hero-3"></div>

                    </div>

                    <div class="back-row">

                        <div id="hero-4"></div>
                        <div id="hero-5"></div>

                    </div>

                </div>

            </div>

            <!-- Battle Controls -->

            <div class="battle-controls">

                <button id="start-btn"
                        onclick="startBattle()">
                    START BATTLE
                </button>

            </div>

            <!-- Battle Log -->

            <div id="battle-log">

            </div>

        </section>

        <!-- ========================= -->
        <!-- SUMMON -->
        <!-- ========================= -->

        <section id="summon-view" class="hidden">

            <button onclick="showView('lobby')">
                ← Back
            </button>

            <div class="summon-circle">

                ✨

            </div>

            <div class="summon-buttons">

                <button onclick="doSummon(1)">
                    Summon x1
                </button>

                <button onclick="doSummon(10)">
                    Summon x10
                </button>

            </div>

            <div id="summon-results">

            </div>

        </section>

        <!-- ========================= -->
        <!-- HEROES -->
        <!-- ========================= -->

        <section id="heroes-view" class="hidden">

            <button onclick="showView('lobby')">
                ← Back
            </button>

            <div class="heroes-header">

                <h2>
                    Hero Collection
                </h2>

                <div>
                    Owned:
                    <span id="hero-count">
                        0
                    </span>
                </div>

            </div>

            <div id="hero-grid">

            </div>

        </section>

        <!-- ========================= -->
        <!-- GUILD -->
        <!-- ========================= -->

        <section id="guild-view" class="hidden">

            <button onclick="showView('lobby')">
                ← Back
            </button>

            <h2>
                Guild Hall
            </h2>

            <div class="guild-grid">

                <div class="guild-card">

                    <h3>
                        Guild Technology
                    </h3>

                    <p>
                        Upgrade account bonuses.
                    </p>

                </div>

                <div class="guild-card">

                    <h3>
                        Guild Boss
                    </h3>

                    <p>
                        Ancient Void Dragon
                    </p>

                </div>

            </div>

        </section>

    </main>

</div>

<script src="{{ url_for('static', filename='js/game.js') }}"></script>

</body>
</html>
